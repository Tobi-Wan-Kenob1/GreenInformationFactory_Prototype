name: greeninfo
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - jupyterlab
  - pandas
  - numpy
  - scikit-learn
  - matplotlib
  - seaborn
  - requests
  - joblib
  - ipykernel
  - pytest
  - openpyxl
  - pip
  - pyzenodo3

  # Optional: for working with Zenodo REST APIs or JSON data
  - pip:
      - python-dotenv
      # Install this repo as an editable package so `import gif`, `import
      # helper` and the `gif` CLI all work from anywhere in the tree.
      - -e .

# How to Use

# Create the environment
#conda env create -f environment.yml

# Activate the environment
#conda activate greeninfo

# Start JupyterLab (or notebook)
#jupyter lab
