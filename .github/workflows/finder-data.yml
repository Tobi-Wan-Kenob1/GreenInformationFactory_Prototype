name: Finder data snapshot

# Refresh the Policy & Grant Finder's offline snapshot (docs/finder/data/
# grants.json + policies.json) from the EU Funding & Tenders search API and
# the Publications Office CELLAR SPARQL endpoint. The web app on GitHub Pages
# uses these files whenever the live APIs are unreachable from the browser.
#
# Keywords come from docs/finder/data/snapshot_config.json.

on:
  workflow_dispatch:
  schedule:
    # Mondays 05:17 UTC — weekly is plenty for call topics and legal acts.
    - cron: "17 5 * * 1"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch snapshot
        run: gif finder-data

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/finder/data/grants.json docs/finder/data/policies.json
          if git diff --cached --quiet; then
            echo "Snapshot unchanged — nothing to commit."
          else
            git commit -m "chore: refresh finder data snapshot ($(date -u +%F))"
            git push
          fi
