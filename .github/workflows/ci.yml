name: CI

# Run the test suite for the gif package + helpers on every push / PR.
on:
  push:
    branches: ["**"]
    # Don't run CI for the Zenodo release/download tags — those drive the
    # upload/download workflows, not the test suite.
    tags-ignore:
      - "zenodo-*"
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -q

      - name: Smoke-test the CLI
        run: |
          gif models
          gif validate
